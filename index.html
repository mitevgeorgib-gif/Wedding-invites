
<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Георги & Цвети | Покана</title>
  <style>
    :root {
      --bg-1: #160f0b;
      --bg-2: #3a2418;
      --gold: #d8b16a;
      --paper: #fff8ef;
      --text: #f8efe4;
      --muted: rgba(248, 239, 228, 0.72);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(216, 177, 106, 0.24), transparent 34rem),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: rgba(216, 177, 106, 0.14);
      filter: blur(20px);
      pointer-events: none;
    }

    body::before {
      left: -90px;
      top: -80px;
    }

    body::after {
      right: -110px;
      bottom: -100px;
    }

    .page {
      width: min(100%, 520px);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .intro {
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 700ms ease forwards;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: clamp(34px, 9vw, 56px);
      line-height: 1.05;
    }

    .date {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .invite-shell {
      perspective: 1800px;
      margin: 20px auto 14px;
      opacity: 0;
      animation: fadeUp 700ms ease 140ms forwards;
    }

    .invite-card {
      width: min(100%, 430px);
      aspect-ratio: 0.705;
      margin: 0 auto;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 850ms cubic-bezier(.2,.8,.2,1);
      border-radius: 22px;
      cursor: pointer;
      filter: drop-shadow(0 28px 42px var(--shadow));
    }

    .invite-card.is-flipped {
      transform: rotateY(180deg);
    }

    .side {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 22px;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .side img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .back {
      transform: rotateY(180deg);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 700ms ease 250ms forwards;
    }

    button,
    .link-button {
      appearance: none;
      border: 1px solid rgba(216, 177, 106, 0.42);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      text-decoration: none;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    button:hover,
    .link-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(216, 177, 106, 0.7);
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      opacity: 0;
      animation: fadeUp 700ms ease 360ms forwards;
    }

    .home-list {
      margin-top: 24px;
      display: grid;
      gap: 10px;
      text-align: left;
    }

    .home-list a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(216, 177, 106, 0.24);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 12px 14px;
    }

    .home-list a:hover {
      border-color: rgba(216, 177, 106, 0.65);
    }

    .error {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(216, 177, 106, 0.28);
      border-radius: 20px;
      padding: 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 18px 14px;
      }

      .invite-card {
        width: min(100%, 390px);
        border-radius: 18px;
      }

      .side {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page" id="app"></main>

  <script>
    const invites = [
      "Filip",
      "Gabi",
      "Gabi_A-Lign",
      "Niki_Yolovski",
      "Petyo_Vinchev",
      "Radi",
      "Stefcho",
      "Veselin_i_Ivelina",
      "Yanislav"
    ];

    const params = new URLSearchParams(window.location.search);
    const selectedInvite = params.get("invite");
    const app = document.getElementById("app");

    function niceName(folderName) {
      return folderName
        .replaceAll("_", " ")
        .replaceAll("-", " ")
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function renderHome() {
      app.innerHTML = `
        <section class="intro">
          <p class="eyebrow">Wedding invitation</p>
          <h1>Георги & Цвети</h1>
          <p class="date">05.09.2026</p>
          <p class="hint">Избери покана за тест. После ще изпращаш директния линк към конкретния гост.</p>
        </section>
        <nav class="home-list">
          ${invites.map(name => `<a href="?invite=${encodeURIComponent(name)}">${niceName(name)}</a>`).join("")}
        </nav>
      `;
    }

    function renderInvite(folderName) {
      if (!invites.includes(folderName)) {
        app.innerHTML = `
          <section class="error">
            <h1>Поканата не е намерена</h1>
            <p>Провери дали линкът е копиран правилно.</p>
            <p><a class="link-button" href="./">Към началото</a></p>
          </section>
        `;
        return;
      }

      app.innerHTML = `
        <section class="intro">
          <p class="eyebrow">Сватбена покана</p>
          <h1>Георги & Цвети</h1>
          <p class="date">05.09.2026</p>
        </section>

        <section class="invite-shell" aria-label="Дигитална сватбена покана">
          <div class="invite-card" id="inviteCard" role="button" tabindex="0" aria-label="Обърни поканата">
            <div class="side front">
              <img src="${folderName}/front.png" alt="Лице на поканата" />
            </div>
            <div class="side back">
              <img src="${folderName}/back.png" alt="Гръб на поканата" />
            </div>
          </div>
        </section>

        <div class="actions">
          <button type="button" id="flipButton">Обърни поканата</button>
          <a class="link-button" href="./">Назад</a>
        </div>

        <p class="hint">Докосни поканата или бутона, за да видиш другата страна.</p>
      `;

      const card = document.getElementById("inviteCard");
      const flipButton = document.getElementById("flipButton");

      function flipCard() {
        card.classList.toggle("is-flipped");
      }

      card.addEventListener("click", flipCard);
      flipButton.addEventListener("click", flipCard);
      card.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          flipCard();
        }
      });
    }

    if (selectedInvite) {
      renderInvite(selectedInvite);
    } else {
      renderHome();
    }
  </script>
</body>
</html>
